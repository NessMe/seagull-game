<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Чайка</title>

  <!-- Шрифт Montserrat из Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet" />

  <!-- Import Map: подключаем Three.js через CDN -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <style>
    /* === Глобальные стили === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      /* Градиент фона: голубой вверху → почти белый внизу */
      background: linear-gradient(to bottom, #B3E0F2 0%, #F5F0E8 100%);
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
    }

    /* Канвас Three.js занимает весь экран */
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* === UI: надпись «Чайка» по центру экрана === */
    #title-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-align: center;
      pointer-events: none;
      user-select: none;
    }

    #title-overlay h1 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: clamp(3rem, 10vw, 8rem);
      color: #ffffff;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      /* Мягкая тень для читаемости на светлом фоне */
      text-shadow:
        0 2px 30px rgba(120, 180, 220, 0.6),
        0 0 80px rgba(100, 160, 210, 0.3);
      /* Плавное появление при загрузке */
      animation: fadeIn 2s ease forwards;
      opacity: 0;
    }

    #title-overlay .subtitle {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: clamp(0.6rem, 2vw, 1rem);
      color: rgba(255, 255, 255, 0.75);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      margin-top: 0.5em;
      animation: fadeIn 2s ease 0.8s forwards;
      opacity: 0;
    }

    /* Анимация плавного появления */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Подсказка управления (внизу экрана) */
    #controls-hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: fadeIn 2s ease 1.5s forwards;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Контейнер для Three.js canvas -->
  <div id="canvas-container"></div>

  <!-- UI: название игры по центру -->
  <div id="title-overlay">
    <h1>Чайка</h1>
    <div class="subtitle">над морем</div>
  </div>

  <!-- Подсказка управления -->
  <div id="controls-hint">↑ ↓ ← → — управление · Пробел — взлёт</div>

  <!-- =========================================================
       Основной JavaScript: Three.js сцена
  ========================================================= -->
  <script type="module">
    import * as THREE from 'three';

    // ─── Базовая настройка рендерера ───────────────────────────
    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true,          // прозрачный фон — сквозь него виден CSS-градиент body
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    // Добавляем canvas в контейнер (z-index: 0, не перекрывает UI)
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // ─── Сцена ────────────────────────────────────────────────
    const scene = new THREE.Scene();

    // Туман: тёплый песочный цвет, плотность 0.0015
   scene.fog = new THREE.FogExp2(0xE8D5B7, 0.0007);

    // ─── Камера ──────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      2000
    );
    camera.position.set(0, 15, 25);  // стартовая позиция по заданию
    camera.lookAt(0, 0, 0);

    // ─── Освещение ───────────────────────────────────────────

    // AmbientLight — мягкое рассеянное освещение, интенсивность 0.6
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    // DirectionalLight — тёплый цвет #FFE4B5, позиция (50, 30, 30)
    const dirLight = new THREE.DirectionalLight(0xFFE4B5, 1.2);
    dirLight.position.set(50, 30, 30);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.far = 300;
    dirLight.shadow.camera.left   = -100;
    dirLight.shadow.camera.right  =  100;
    dirLight.shadow.camera.top    =  100;
    dirLight.shadow.camera.bottom = -100;
    scene.add(dirLight);

    // Мягкий заполняющий свет — имитация отражения воды снизу
    const fillLight = new THREE.HemisphereLight(0x87CEEB, 0x7EC8E3, 0.4);
    scene.add(fillLight);

    // ─── Море: графичные волны в стиле Уэса Андерсона ──────────
    //
    // Плоскость 300×300 с сегментами 200×200.
    // flatShading: true убирает сглаживание нормалей — грани выглядят
    // как плоские мазки гуашью, а не как сглаженная поверхность.
   const planeGeometry = new THREE.PlaneGeometry(600, 600, 400, 400);

    // Атрибут цвета вершин — будет обновляться каждый кадр
    const vertexCount = planeGeometry.attributes.position.count;
    const colorsArray = new Float32Array(vertexCount * 3);
    planeGeometry.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));

    const planeMaterial = new THREE.MeshStandardMaterial({
      vertexColors: true,     // цвет берётся из атрибута вершин, не из .color
      transparent: true,
      opacity: 0.92,
      side: THREE.DoubleSide,
      roughness: 0.55,
      metalness: 0.05,
      flatShading: true,      // рисованный вид — грани без интерполяции нормалей
    });

    const plane = new THREE.Mesh(planeGeometry, planeMaterial);
    plane.rotation.x = -Math.PI / 2;  // горизонтально, Y=0
    plane.position.y = 0;
    plane.receiveShadow = true;
    scene.add(plane);

    // Кэшируем ссылки на атрибуты (избегаем лукапа по строке в горячем цикле)
    const planePositions = planeGeometry.attributes.position;
    const planeColors    = planeGeometry.attributes.color;

    // Палитра для цветов волн (гуашь Уэса Андерсона):
    //   Впадина     → глубокий бирюзовый  #3A8A9A
    //   Середина    → пастельный          #7EC8E3
    //   Гребень     → ярко-белый          #FFFFFF
    //   Пена (пик)  → кремово-белый       #FFF8E7
    const colorDeep  = new THREE.Color(0x3A8A9A);
    const colorMid   = new THREE.Color(0x7EC8E3);
    const colorCrest = new THREE.Color(0xFFFFFF);
    const colorFoam  = new THREE.Color(0xFFF8E7);

    // Временный объект — переиспользуем в цикле, не создаём новый каждый кадр
    const tmpColor = new THREE.Color();

  function waveHeight(wx, wz, t) {
  const p = 3.0;

  // Волна 1: долгая зыбь — основная, идёт по Z, X-компонент уменьшен в 4 раза
  const w1 = Math.pow(1.0 - Math.abs(Math.sin((wx * 0.00875 + wz * 0.020) + t * 0.45)), p) * 2.2;

  // Волна 2: поперечная — основной ход по Z, X-компонент уменьшен в 4 раза
  const w2 = Math.pow(1.0 - Math.abs(Math.sin((wx * 0.01375 - wz * 0.045) + t * 0.65)), p) * 1.5;

  // Волна 3: мелкая рябь — X-компонент уменьшен в 3 раза
  const w3 = Math.pow(1.0 - Math.abs(Math.sin((wx * 0.03333 + wz * 0.080) + t * 1.10)), p) * 0.7;

  // Волна 4: медленная контрволна — X-компонент уменьшен в 4 раза
  const w4 = Math.pow(1.0 - Math.abs(Math.sin((-wx * 0.007 + wz * 0.042) + t * 0.30)), p) * 1.0;

  const raw = (w1 + w2 + w3 + w4) / (2.2 + 1.5 + 0.7 + 1.0);

  // Лёгкая нерегулярность гребней по длине волны
  let amplitude = Math.pow(raw, 1.6) * 9.0;
  amplitude *= (1 + 0.1 * Math.sin(wx * 0.5));

  return amplitude;
}

    // ─── Чайка (процедурная геометрия) ───────────────────────

    // Крыло — вытянутый безье-контур, выдавленный через ExtrudeGeometry
    function createWing(mirrorX = false) {
      const shape = new THREE.Shape();
      const sign  = mirrorX ? -1 : 1;

      shape.moveTo(0, 0);
      shape.bezierCurveTo(sign * 0.5, 0.3, sign * 2.5, 0.6, sign * 4.5, 0.1);
      shape.bezierCurveTo(sign * 3.5, -0.1, sign * 1.5, -0.3, 0, 0);

      const geometry = new THREE.ExtrudeGeometry(shape, {
        depth: 0.05,
        bevelEnabled: true,
        bevelSize: 0.05,
        bevelThickness: 0.02,
        bevelSegments: 2,
      });
      const material = new THREE.MeshStandardMaterial({
        color: 0xF8F4F0,
        roughness: 0.7,
        metalness: 0.0,
        side: THREE.DoubleSide,
      });
      return new THREE.Mesh(geometry, material);
    }

    // Тело — капсула, повёрнутая горизонтально
    function createBody() {
      const mesh = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.2, 0.7, 8, 16),
        new THREE.MeshStandardMaterial({ color: 0xF5F1ED, roughness: 0.8 })
      );
      mesh.rotation.z = Math.PI / 2;
      return mesh;
    }

    // Хвост — конус
    function createTail() {
      const mesh = new THREE.Mesh(
        new THREE.ConeGeometry(0.15, 0.5, 6),
        new THREE.MeshStandardMaterial({ color: 0xEDE9E4, roughness: 0.8 })
      );
      mesh.rotation.z = Math.PI / 2;
      mesh.position.x = -0.6;
      return mesh;
    }

    // Голова — сфера
    function createHead() {
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 12, 12),
        new THREE.MeshStandardMaterial({ color: 0xF5F1ED, roughness: 0.8 })
      );
      mesh.position.set(0.55, 0.12, 0);
      return mesh;
    }

    // Клюв — конус жёлтого цвета
    function createBeak() {
      const mesh = new THREE.Mesh(
        new THREE.ConeGeometry(0.05, 0.3, 6),
        new THREE.MeshStandardMaterial({ color: 0xF5C842, roughness: 0.5 })
      );
      mesh.rotation.z = -Math.PI / 2;
      mesh.position.set(0.85, 0.1, 0);
      return mesh;
    }

    // Собираем чайку из всех частей
    function createSeagull() {
      const group = new THREE.Group();

      const wingL = createWing(false);   // правое крыло
      const wingR = createWing(true);    // левое крыло (зеркальное)

      wingL.position.set(-0.1, 0.08,  0.05);
      wingR.position.set(-0.1, 0.08, -0.10);

      group.add(createBody(), createTail(), createHead(), createBeak(), wingL, wingR);

      // Включаем тени для всех дочерних мешей
      group.traverse(child => {
        if (child.isMesh) child.castShadow = true;
      });

      // Ссылки на крылья нужны для анимации маха
      group.userData.wingL = wingL;
      group.userData.wingR = wingR;

      return group;
    }

    // ─── Создаём стаю чаек ────────────────────────────────────
    const seagulls = [];

    for (let i = 0; i < 7; i++) {
      const gull   = createSeagull();
      const angle  = (i / 7) * Math.PI * 2;
      const radius = 5 + Math.random() * 15;

      gull.position.set(
        Math.cos(angle) * radius,
        4 + Math.random() * 8,
        Math.sin(angle) * radius
      );
      gull.scale.setScalar(0.6 + Math.random() * 0.6);

      gull.userData.speed         = 0.004 + Math.random() * 0.006;
      gull.userData.orbitRadius   = radius;
      gull.userData.orbitAngle    = angle;
      gull.userData.orbitY        = gull.position.y;
      gull.userData.wingPhase     = Math.random() * Math.PI * 2;
      gull.userData.wingSpeed     = 1.5 + Math.random() * 2;
      gull.userData.verticalPhase = Math.random() * Math.PI * 2;

      scene.add(gull);
      seagulls.push(gull);
    }

    // ─── Облака (группы сфер) ─────────────────────────────────
    function createCloud() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({
        color: 0xFFFFFF,
        transparent: true,
        opacity: 0.85,
        roughness: 1.0,
      });
      [
        { r: 1.8, x:  0.0, y:  0.0, z: 0.0 },
        { r: 1.4, x:  1.8, y: -0.3, z: 0.3 },
        { r: 1.2, x: -1.6, y: -0.2, z: 0.1 },
        { r: 1.0, x:  0.6, y:  0.8, z: 0.0 },
        { r: 0.9, x: -0.5, y:  0.6, z: 0.2 },
      ].forEach(b => {
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(b.r, 10, 10), mat);
        mesh.position.set(b.x, b.y, b.z);
        group.add(mesh);
      });
      return group;
    }

    const clouds = [];
    for (let i = 0; i < 8; i++) {
      const cloud = createCloud();
      const angle = (i / 8) * Math.PI * 2 + Math.random() * 0.5;
      const dist  = 20 + Math.random() * 40;
      cloud.position.set(
        Math.cos(angle) * dist,
        12 + Math.random() * 8,
        Math.sin(angle) * dist
      );
      cloud.scale.setScalar(0.8 + Math.random() * 1.2);
      cloud.userData.speed = 0.0008 + Math.random() * 0.0005;
      cloud.userData.angle = angle;
      cloud.userData.dist  = dist;
      scene.add(cloud);
      clouds.push(cloud);
    }

    // ─── Управление игроком ───────────────────────────────────
    const keys = {};
    window.addEventListener('keydown', e => { keys[e.code] = true; });
    window.addEventListener('keyup',   e => { keys[e.code] = false; });

    // Первая чайка — игрок
    const playerGull = seagulls[0];
    playerGull.scale.setScalar(1.2);
    playerGull.position.set(0, 6, 10);
    playerGull.userData.isPlayer   = true;
    playerGull.userData.velocityY  = 0;

    // ─── Адаптация к изменению размера окна ──────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── Главный цикл анимации ────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // ── Графичные волны: острые гребни, палитра гуашь ──────
      //
      // Три зоны окраски по высоте:
      //   0   .. mid    → deep  → mid   (впадина → склон)
      //   mid .. crest  → mid   → white (склон → гребень)
      //   crest.. max   → white → foam  (гребень → пенная шапка)
      const maxHeight    = 9.0;
      const midLevel     = maxHeight * 0.35; // граница впадина/склон
      const crestLevel   = maxHeight * 0.72; // граница склон/гребень
      const foamLevel    = maxHeight * 0.88; // граница гребень/пена

      for (let i = 0; i < planePositions.count; i++) {
        const wx = planePositions.getX(i);
        const wz = planePositions.getY(i);

        const h = waveHeight(wx, wz, t);
        planePositions.setZ(i, h);

        // Трёхступенчатая интерполяция цвета
        if (h >= foamLevel) {
          // Пенная шапка — кремово-белый #FFF8E7
          const t2 = Math.min((h - foamLevel) / (maxHeight - foamLevel), 1.0);
          tmpColor.copy(colorCrest).lerp(colorFoam, t2);
        } else if (h >= crestLevel) {
          // Гребень — от пастельного к ярко-белому
          const t2 = (h - crestLevel) / (foamLevel - crestLevel);
          tmpColor.copy(colorMid).lerp(colorCrest, Math.pow(t2, 0.5));
        } else if (h >= midLevel) {
          // Склон — от бирюзового к пастельному
          const t2 = (h - midLevel) / (crestLevel - midLevel);
          tmpColor.copy(colorDeep).lerp(colorMid, t2);
        } else {
          // Глубокая впадина — чистый #3A8A9A
          tmpColor.copy(colorDeep);
        }

        planeColors.setXYZ(i, tmpColor.r, tmpColor.g, tmpColor.b);
      }

      planePositions.needsUpdate = true;
      planeColors.needsUpdate    = true;
      planeGeometry.computeVertexNormals();   // пересчитываем нормали после смещения вершин

      // ── Дрейф облаков ──────────────────────────────────────
      clouds.forEach(cloud => {
        cloud.userData.angle += cloud.userData.speed;
        cloud.position.x = Math.cos(cloud.userData.angle) * cloud.userData.dist;
        cloud.position.z = Math.sin(cloud.userData.angle) * cloud.userData.dist;
        cloud.position.y += Math.sin(t * 0.3 + cloud.userData.angle) * 0.002;
      });

      // ── NPC-чайки: круговые орбиты с покачиванием ──────────
      seagulls.forEach(gull => {
        if (gull.userData.isPlayer) return;

        gull.userData.orbitAngle += gull.userData.speed;
        const a = gull.userData.orbitAngle;
        const r = gull.userData.orbitRadius;

        gull.position.x = Math.cos(a) * r;
        gull.position.z = Math.sin(a) * r;
        gull.position.y = gull.userData.orbitY
          + Math.sin(t * 0.5 + gull.userData.verticalPhase) * 1.2;

        gull.rotation.y = -a + Math.PI / 2;  // смотрит по направлению движения

        const wingAngle = Math.sin(t * gull.userData.wingSpeed + gull.userData.wingPhase) * 0.4;
        gull.userData.wingL.rotation.x =  wingAngle;
        gull.userData.wingR.rotation.x = -wingAngle;
      });

      // ── Управление игроком ─────────────────────────────────
      const moveSpeed = 0.08;
      const turnSpeed = 0.03;

      if (keys['ArrowLeft'])  playerGull.rotation.y += turnSpeed;
      if (keys['ArrowRight']) playerGull.rotation.y -= turnSpeed;

      const dir = new THREE.Vector3(
        -Math.sin(playerGull.rotation.y),
        0,
        -Math.cos(playerGull.rotation.y)
      );
      if (keys['ArrowUp'])   playerGull.position.addScaledVector(dir,  moveSpeed);
      if (keys['ArrowDown']) playerGull.position.addScaledVector(dir, -moveSpeed);

      // Пробел — взлёт; без пробела — плавное снижение (имитация гравитации)
      if (keys['Space']) {
        playerGull.userData.velocityY = 0.08;
      } else {
        playerGull.userData.velocityY -= 0.003;
      }
      playerGull.userData.velocityY = Math.max(-0.1, Math.min(0.1, playerGull.userData.velocityY));
      playerGull.position.y = Math.max(1.5, Math.min(30,
        playerGull.position.y + playerGull.userData.velocityY
      ));

      // Мах крыльями быстрее при взлёте
      const pWingAngle = Math.sin(t * (keys['Space'] ? 4 : 2)) * 0.5;
      playerGull.userData.wingL.rotation.x =  pWingAngle;
      playerGull.userData.wingR.rotation.x = -pWingAngle;

      // ── Камера следит за игроком (плавно через lerp) ───────
      const offset = new THREE.Vector3(
        Math.sin(playerGull.rotation.y) * 20,
        12,
        Math.cos(playerGull.rotation.y) * 20
      );
      camera.position.lerp(playerGull.position.clone().add(offset), 0.05);
      camera.lookAt(playerGull.position);

      renderer.render(scene, camera);
    }

    animate();  // запускаем цикл
  </script>

</body>
</html>

<!--
=================================================================
  📋 ИНСТРУКЦИЯ: КАК ЗАДЕПЛОИТЬ НА GITHUB PAGES
=================================================================

  Шаг 1. Создай аккаунт на GitHub (если ещё нет)
  ────────────────────────────────────────────────
  Зайди на https://github.com и зарегистрируйся.

  Шаг 2. Создай новый репозиторий
  ────────────────────────────────────────────────
  • Нажми кнопку «+» → «New repository»
  • Назови репозиторий, например: seagull-game
  • Оставь его публичным (Public)
  • Нажми «Create repository»

  Шаг 3. Загрузи файл в репозиторий
  ────────────────────────────────────────────────
  Вариант А — через браузер (проще):
    • В только что созданном репозитории нажми «Add file» → «Upload files»
    • Переименуй файл в index.html (GitHub Pages ищет именно его)
    • Перетащи файл в область загрузки
    • Внизу нажми «Commit changes»

  Вариант Б — через Git (терминал):
    git init
    git add index.html
    git commit -m "Initial commit: Чайка game"
    git branch -M main
    git remote add origin https://github.com/ВАШ_ЛОГИН/seagull-game.git
    git push -u origin main

  Шаг 4. Включи GitHub Pages
