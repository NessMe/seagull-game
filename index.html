<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Чайка</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet" />

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(to bottom, #B3E0F2 0%, #F5F0E8 100%);
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
    }

    #canvas-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    #title-overlay {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-align: center;
      pointer-events: none;
      user-select: none;
    }

    #title-overlay h1 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: clamp(3rem, 10vw, 8rem);
      color: #ffffff;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-shadow:
        0 2px 30px rgba(120, 180, 220, 0.6),
        0 0 80px rgba(100, 160, 210, 0.3);
      animation: fadeIn 2s ease forwards;
      opacity: 0;
    }

    #title-overlay .subtitle {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: clamp(0.6rem, 2vw, 1rem);
      color: rgba(255, 255, 255, 0.75);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      margin-top: 0.5em;
      animation: fadeIn 2s ease 0.8s forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #controls-hint {
      position: fixed;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: fadeIn 2s ease 1.5s forwards;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="canvas-container"></div>

  <div id="title-overlay">
    <h1>Чайка</h1>
    <div class="subtitle">над морем</div>
  </div>

  <div id="controls-hint">↑ ↓ ← → — управление · Пробел — взлёт</div>

  <script type="module">
    import * as THREE from 'three';

    // ─── Рендерер ────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // ─── Сцена ───────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0xE8D5B7, 0.0015);

    // ─── Камера ──────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 15, 25);
    camera.lookAt(0, 0, 0);

    // ─── Освещение ───────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const dirLight = new THREE.DirectionalLight(0xFFE4B5, 1.2);
    dirLight.position.set(50, 30, 30);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.far = 300;
    dirLight.shadow.camera.left   = -100;
    dirLight.shadow.camera.right  =  100;
    dirLight.shadow.camera.top    =  100;
    dirLight.shadow.camera.bottom = -100;
    scene.add(dirLight);
    scene.add(new THREE.HemisphereLight(0x87CEEB, 0x7EC8E3, 0.4));

    // ═══════════════════════════════════════════════════════════
    //  МОРЕ: направленные волны + Canvas-текстура
    // ═══════════════════════════════════════════════════════════

    // ── Canvas-текстура: резкие горизонтальные полосы ──────────
    //
    // Текстура — вертикальная полоска 4×512 пикселей.
    // По оси Y (которая маппится на Z плоскости) идут:
    //   тёмно-бирюзовый → светлый бирюзовый → белый → кремовый → тёмно-бирюзовый
    // Резкость достигается маленькими зонами линейного перехода.
    const TEX_W = 4;
    const TEX_H = 512;

    const waveCanvas = document.createElement('canvas');
    waveCanvas.width  = TEX_W;
    waveCanvas.height = TEX_H;
    const ctx = waveCanvas.getContext('2d');

    function buildWaveTexture() {
      ctx.clearRect(0, 0, TEX_W, TEX_H);

      // Одна «волновая полоса» занимает весь TEX_H.
      // Разбиваем на зоны (доли от 0 до 1):
      //   [0.00–0.30]  впадина: тёмный бирюзовый
      //   [0.30–0.55]  склон:   переход к светлому
      //   [0.55–0.78]  гребень: быстрый переход к белому
      //   [0.78–0.90]  пена:    белый/кремовый
      //   [0.90–1.00]  спуск:   резко обратно в тёмный (следующая впадина)
      const stops = [
        { pos: 0.00, color: '#3A8A9A' },
        { pos: 0.28, color: '#3A8A9A' },   // длинная впадина — почти плоская
        { pos: 0.50, color: '#7EC8E3' },   // плавный подъём
        { pos: 0.72, color: '#B8E8F5' },   // предгребневая зона
        { pos: 0.80, color: '#FFFFFF' },   // резкий белый гребень
        { pos: 0.88, color: '#FFF8E7' },   // кремовая пена
        { pos: 0.93, color: '#FFFFFF' },   // обратная сторона
        { pos: 1.00, color: '#3A8A9A' },   // падение в следующую впадину
      ];

      const grad = ctx.createLinearGradient(0, 0, 0, TEX_H);
      stops.forEach(s => grad.addColorStop(s.pos, s.color));

      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, TEX_W, TEX_H);
    }

    buildWaveTexture();

    const waveTexture = new THREE.CanvasTexture(waveCanvas);
    waveTexture.wrapS = THREE.RepeatWrapping;
    waveTexture.wrapT = THREE.RepeatWrapping;
    // Масштаб: 1 повтор текстуры = 1 «волна» по Z.
    // При плоскости 300×300 и желаемых ~6 волнах — repeat = (1, 6).
    waveTexture.repeat.set(1, 6);

    // ── Геометрия плоскости ────────────────────────────────────
    const planeGeometry = new THREE.PlaneGeometry(300, 300, 120, 240);
    // Больше сегментов по Z (направление волн) для чёткого рельефа

    const planeMaterial = new THREE.MeshStandardMaterial({
      map: waveTexture,           // текстура вместо vertexColors
      transparent: true,
      opacity: 0.95,
      side: THREE.DoubleSide,
      roughness: 0.45,
      metalness: 0.08,
      flatShading: true,          // графичные плоские грани
    });

    const plane = new THREE.Mesh(planeGeometry, planeMaterial);
    plane.rotation.x = -Math.PI / 2;
    plane.position.y = 0;
    plane.receiveShadow = true;
    scene.add(plane);

    const planePositions = planeGeometry.attributes.position;

    // ── Функция высоты волны ───────────────────────────────────
    //
    // Все компоненты зависят ТОЛЬКО от wz (ось движения волны к берегу).
    // wx входит только в шумовую модуляцию амплитуды, чтобы гребни
    // были слегка изломанными, а не идеально прямыми.
    //
    // Шум: сумма двух медленных синусоид по X даёт квазислучайную
    // огибающую — дёшево, без импорта simplex-noise.
    function noiseX(wx) {
      return 0.72
        + 0.18 * Math.sin(wx * 0.07)
        + 0.10 * Math.sin(wx * 0.19 + 1.3);
    }

    function waveHeight(wx, wz, t) {
      const n = noiseX(wx);  // огибающая по X: диапазон ~0.44 .. 1.00

      // Главная зыбь — длинные пологие волны
      const w1 = Math.sin(wz * 0.055 + t * 0.50) * 2.8;

      // Вторая гармоника — чуть выше частота, немного другой темп
      const w2 = Math.sin(wz * 0.110 + t * 0.70) * 1.6;

      // Мелкая рябь — быстрые короткие волны
      const w3 = Math.sin(wz * 0.230 + t * 1.10) * 0.7;

      // Длинная контрволна — медленная, добавляет неравномерность
      const w4 = Math.sin(wz * 0.032 + t * 0.28) * 1.4;

      // Высокочастотная деталь — маленькие барашки
      const w5 = Math.sin(wz * 0.400 + t * 1.80) * 0.25;

      // Финальная высота: сумма × шумовая огибающая.
      // Нормируем в диапазон 0..+maxH, смещая на половину суммы амплитуд:
      const raw = w1 + w2 + w3 + w4 + w5;           // диапазон ~ -6.75..+6.75
      const normalized = (raw + 6.75) / 13.5;        // 0..1
      return Math.pow(normalized, 1.4) * 8.0 * n;    // заострение гребней + шум
    }

    // Смещение текстуры в каждом кадре: двигаем вместе с волнами
    // скорость подобрана эмпирически — совпадает с визуальным движением гребней
    let texOffsetV = 0;

    // ─── Чайка ────────────────────────────────────────────────

    function createWing(mirrorX = false) {
      const shape = new THREE.Shape();
      const sign  = mirrorX ? -1 : 1;
      shape.moveTo(0, 0);
      shape.bezierCurveTo(sign * 0.5, 0.3, sign * 2.5, 0.6, sign * 4.5, 0.1);
      shape.bezierCurveTo(sign * 3.5, -0.1, sign * 1.5, -0.3, 0, 0);
      const geometry = new THREE.ExtrudeGeometry(shape, {
        depth: 0.05, bevelEnabled: true,
        bevelSize: 0.05, bevelThickness: 0.02, bevelSegments: 2,
      });
      const material = new THREE.MeshStandardMaterial({
        color: 0xF8F4F0, roughness: 0.7, metalness: 0.0, side: THREE.DoubleSide,
      });
      return new THREE.Mesh(geometry, material);
    }

    function createBody() {
      const mesh = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.2, 0.7, 8, 16),
        new THREE.MeshStandardMaterial({ color: 0xF5F1ED, roughness: 0.8 })
      );
      mesh.rotation.z = Math.PI / 2;
      return mesh;
    }

    function createTail() {
      const mesh = new THREE.Mesh(
        new THREE.ConeGeometry(0.15, 0.5, 6),
        new THREE.MeshStandardMaterial({ color: 0xEDE9E4, roughness: 0.8 })
      );
      mesh.rotation.z = Math.PI / 2;
      mesh.position.x = -0.6;
      return mesh;
    }

    function createHead() {
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 12, 12),
        new THREE.MeshStandardMaterial({ color: 0xF5F1ED, roughness: 0.8 })
      );
      mesh.position.set(0.55, 0.12, 0);
      return mesh;
    }

    function createBeak() {
      const mesh = new THREE.Mesh(
        new THREE.ConeGeometry(0.05, 0.3, 6),
        new THREE.MeshStandardMaterial({ color: 0xF5C842, roughness: 0.5 })
      );
      mesh.rotation.z = -Math.PI / 2;
      mesh.position.set(0.85, 0.1, 0);
      return mesh;
    }

    function createSeagull() {
      const group = new THREE.Group();
      const wingL = createWing(false);
      const wingR = createWing(true);
      wingL.position.set(-0.1, 0.08,  0.05);
      wingR.position.set(-0.1, 0.08, -0.10);
      group.add(createBody(), createTail(), createHead(), createBeak(), wingL, wingR);
      group.traverse(child => { if (child.isMesh) child.castShadow = true; });
      group.userData.wingL = wingL;
      group.userData.wingR = wingR;
      return group;
    }

    // ─── Стая ─────────────────────────────────────────────────
    const seagulls = [];

    for (let i = 0; i < 7; i++) {
      const gull   = createSeagull();
      const angle  = (i / 7) * Math.PI * 2;
      const radius = 5 + Math.random() * 15;
      gull.position.set(
        Math.cos(angle) * radius,
        4 + Math.random() * 8,
        Math.sin(angle) * radius
      );
      gull.scale.setScalar(0.6 + Math.random() * 0.6);
      gull.userData.speed         = 0.004 + Math.random() * 0.006;
      gull.userData.orbitRadius   = radius;
      gull.userData.orbitAngle    = angle;
      gull.userData.orbitY        = gull.position.y;
      gull.userData.wingPhase     = Math.random() * Math.PI * 2;
      gull.userData.wingSpeed     = 1.5 + Math.random() * 2;
      gull.userData.verticalPhase = Math.random() * Math.PI * 2;
      scene.add(gull);
      seagulls.push(gull);
    }

    // ─── Облака ───────────────────────────────────────────────
    function createCloud() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({
        color: 0xFFFFFF, transparent: true, opacity: 0.85, roughness: 1.0,
      });
      [
        { r: 1.8, x:  0.0, y:  0.0, z: 0.0 },
        { r: 1.4, x:  1.8, y: -0.3, z: 0.3 },
        { r: 1.2, x: -1.6, y: -0.2, z: 0.1 },
        { r: 1.0, x:  0.6, y:  0.8, z: 0.0 },
        { r: 0.9, x: -0.5, y:  0.6, z: 0.2 },
      ].forEach(b => {
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(b.r, 10, 10), mat);
        mesh.position.set(b.x, b.y, b.z);
        group.add(mesh);
      });
      return group;
    }

    const clouds = [];
    for (let i = 0; i < 8; i++) {
      const cloud = createCloud();
      const angle = (i / 8) * Math.PI * 2 + Math.random() * 0.5;
      const dist  = 20 + Math.random() * 40;
      cloud.position.set(
        Math.cos(angle) * dist,
        12 + Math.random() * 8,
        Math.sin(angle) * dist
      );
      cloud.scale.setScalar(0.8 + Math.random() * 1.2);
      cloud.userData.speed = 0.0008 + Math.random() * 0.0005;
      cloud.userData.angle = angle;
      cloud.userData.dist  = dist;
      scene.add(cloud);
      clouds.push(cloud);
    }

    // ─── Управление ───────────────────────────────────────────
    const keys = {};
    window.addEventListener('keydown', e => { keys[e.code] = true; });
    window.addEventListener('keyup',   e => { keys[e.code] = false; });

    const playerGull = seagulls[0];
    playerGull.scale.setScalar(1.2);
    playerGull.position.set(0, 6, 10);
    playerGull.userData.isPlayer  = true;
    playerGull.userData.velocityY = 0;

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── Главный цикл ─────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // ── Обновление геометрии волн ──────────────────────────
      //
      // PlaneGeometry в исходном положении (до rotation.x = -PI/2):
      //   ось X плоскости = мировой X
      //   ось Y плоскости = мировой -Z (!)
      // Поэтому getY(i) — это Z-координата в мировом пространстве,
      // и именно она используется как аргумент волны.
      // getZ(i) — высота вершины (Z-ось геометрии до поворота = мировой Y).
      for (let i = 0; i < planePositions.count; i++) {
        const wx = planePositions.getX(i);  // мировой X (поперёк волн)
        const wz = planePositions.getY(i);  // мировой -Z (вдоль волн)
        planePositions.setZ(i, waveHeight(wx, wz, t));
      }
      planePositions.needsUpdate = true;
      planeGeometry.computeVertexNormals();

      // ── Анимация текстуры: полосы двигаются вместе с волнами ─
      // Скорость = (скорость видимого движения гребней) / (размер плоскости * repeat)
      // Главная волна: wz * 0.055 + t * 0.5 → фазовая скорость = 0.5 / 0.055 ≈ 9.1 ед/с
      // При размере плоскости 300 и repeat.y = 6: texOffset_per_sec = 9.1 / (300/6) = 0.182
      texOffsetV += 0.182 * clock.getDelta() * 0; // getDelta уже потреблён — используем фиксированный шаг
      // Пересчитываем через t напрямую (стабильнее):
      waveTexture.offset.y = (t * 0.182) % 1.0;

      // ── Облака ─────────────────────────────────────────────
      clouds.forEach(cloud => {
        cloud.userData.angle += cloud.userData.speed;
        cloud.position.x = Math.cos(cloud.userData.angle) * cloud.userData.dist;
        cloud.position.z = Math.sin(cloud.userData.angle) * cloud.userData.dist;
        cloud.position.y += Math.sin(t * 0.3 + cloud.userData.angle) * 0.002;
      });

      // ── NPC-чайки ──────────────────────────────────────────
      seagulls.forEach(gull => {
        if (gull.userData.isPlayer) return;
        gull.userData.orbitAngle += gull.userData.speed;
        const a = gull.userData.orbitAngle;
        const r = gull.userData.orbitRadius;
        gull.position.x = Math.cos(a) * r;
        gull.position.z = Math.sin(a) * r;
        gull.position.y = gull.userData.orbitY
          + Math.sin(t * 0.5 + gull.userData.verticalPhase) * 1.2;
        gull.rotation.y = -a + Math.PI / 2;
        const wingAngle = Math.sin(t * gull.userData.wingSpeed + gull.userData.wingPhase) * 0.4;
        gull.userData.wingL.rotation.x =  wingAngle;
        gull.userData.wingR.rotation.x = -wingAngle;
      });

      // ── Игрок ──────────────────────────────────────────────
      const moveSpeed = 0.08;
      const turnSpeed = 0.03;

      if (keys['ArrowLeft'])  playerGull.rotation.y += turnSpeed;
      if (keys['ArrowRight']) playerGull.rotation.y -= turnSpeed;

      const dir = new THREE.Vector3(
        -Math.sin(playerGull.rotation.y), 0,
        -Math.cos(playerGull.rotation.y)
      );
      if (keys['ArrowUp'])   playerGull.position.addScaledVector(dir,  moveSpeed);
      if (keys['ArrowDown']) playerGull.position.addScaledVector(dir, -moveSpeed);

      if (keys['Space']) {
        playerGull.userData.velocityY = 0.08;
      } else {
        playerGull.userData.velocityY -= 0.003;
      }
      playerGull.userData.velocityY = Math.max(-0.1, Math.min(0.1, playerGull.userData.velocityY));
      playerGull.position.y = Math.max(1.5, Math.min(30,
        playerGull.position.y + playerGull.userData.velocityY
      ));

      const pWingAngle = Math.sin(t * (keys['Space'] ? 4 : 2)) * 0.5;
      playerGull.userData.wingL.rotation.x =  pWingAngle;
      playerGull.userData.wingR.rotation.x = -pWingAngle;

      // ── Камера ─────────────────────────────────────────────
      const offset = new THREE.Vector3(
        Math.sin(playerGull.rotation.y) * 20, 12,
        Math.cos(playerGull.rotation.y) * 20
      );
      camera.position.lerp(playerGull.position.clone().add(offset), 0.05);
      camera.lookAt(playerGull.position);

      renderer.render(scene, camera);
    }

    animate();
  </script>

</body>
</html>
