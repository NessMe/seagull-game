<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Чайка</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet" />

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(to bottom, #B3E0F2 0%, #F5F0E8 100%);
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
      /* ── Плавный переход фона ── */
      transition: background 0.0s;
    }
    /* ── Ночной фон body ── */
    body.night {
      background: #1A2A40;
    }
    #canvas-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }
    #title-overlay {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-align: center;
      pointer-events: none;
      user-select: none;
    }
    #title-overlay h1 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: clamp(3rem, 10vw, 8rem);
      color: #ffffff;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-shadow:
        0 2px 30px rgba(120, 180, 220, 0.6),
        0 0 80px rgba(100, 160, 210, 0.3);
      animation: fadeIn 2s ease forwards;
      opacity: 0;
    }
    #title-overlay .subtitle {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: clamp(0.6rem, 2vw, 1rem);
      color: rgba(255, 255, 255, 0.75);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      margin-top: 0.5em;
      animation: fadeIn 2s ease 0.8s forwards;
      opacity: 0;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #controls-hint {
      position: fixed;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: fadeIn 2s ease 1.5s forwards;
      opacity: 0;
      pointer-events: none;
    }

    /* ── Индикатор дня/ночи (новый элемент) ── */
    #time-indicator {
      position: fixed;
      top: 1.2rem;
      right: 1.5rem;
      z-index: 20;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.8);
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.18);
      padding: 0.35em 0.85em;
      border-radius: 2em;
      backdrop-filter: blur(6px);
      pointer-events: none;
      animation: fadeIn 2s ease 2s forwards;
      opacity: 0;
    }
  </style>
</head>
<body>

  <div id="canvas-container"></div>

  <div id="title-overlay">
    <h1>Чайка</h1>
    <div class="subtitle">над морем</div>
  </div>

  <div id="controls-hint">↑ ↓ ← → — управление · Пробел — взлёт · N — день/ночь</div>

  <!-- ── Индикатор текущего времени суток ── -->
  <div id="time-indicator">☀ День</div>

  <script type="module">
    import * as THREE from 'three';

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0xC8E8F5, 0.003);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 6, 20);
    camera.lookAt(0, 3, -10);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xFFE4B5, 1.2);
    dirLight.position.set(50, 30, 30);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.far = 300;
    dirLight.shadow.camera.left   = -100;
    dirLight.shadow.camera.right  =  100;
    dirLight.shadow.camera.top    =  100;
    dirLight.shadow.camera.bottom = -100;
    scene.add(dirLight);

    const fillLight = new THREE.HemisphereLight(0x87CEEB, 0x7EC8E3, 0.4);
    scene.add(fillLight);

    // ─── СОЛНЦЕ ────────────────────────────────────────────────────────
    const SUN_WORLD_POS = new THREE.Vector3(0, 15, -60);

    const sunGroup = new THREE.Group();
    sunGroup.position.copy(SUN_WORLD_POS);

    const sunCore = new THREE.Mesh(
      new THREE.SphereGeometry(3, 32, 32),
      new THREE.MeshBasicMaterial({
        color: 0xFFFDE0, fog: false, depthWrite: false, depthTest: false,
      })
    );
    sunCore.renderOrder = 999;
    sunGroup.add(sunCore);

    const sunMid = new THREE.Mesh(
      new THREE.SphereGeometry(6, 32, 32),
      new THREE.MeshBasicMaterial({
        color: 0xFFE082, transparent: true, opacity: 0.4,
        fog: false, depthWrite: false, depthTest: false,
      })
    );
    sunMid.renderOrder = 998;
    sunGroup.add(sunMid);

    const sunOuter = new THREE.Mesh(
      new THREE.SphereGeometry(10, 32, 32),
      new THREE.MeshBasicMaterial({
        color: 0xFFD54F, transparent: true, opacity: 0.15,
        fog: false, depthWrite: false, depthTest: false,
      })
    );
    sunOuter.renderOrder = 997;
    sunGroup.add(sunOuter);

    scene.add(sunGroup);

    // ─── СВЕТОВАЯ ДОРОЖКА НА ВОДЕ ──────────────────────────────────────
    const sunReflection = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshBasicMaterial({
        color: 0xFFF8DC, transparent: true, opacity: 0.3,
        depthWrite: false, side: THREE.DoubleSide,
      })
    );
    sunReflection.rotation.x = -Math.PI / 2;
    sunReflection.position.set(SUN_WORLD_POS.x, 0.2, SUN_WORLD_POS.z);
    scene.add(sunReflection);

    // ─── ТОЧЕЧНЫЙ ИСТОЧНИК СВЕТА (солнечный) ───────────────────────────
    const sunLight = new THREE.PointLight(0xFFF8DC, 3, 120);
    sunLight.position.set(SUN_WORLD_POS.x, 0.5, SUN_WORLD_POS.z);
    scene.add(sunLight);

    // ══════════════════════════════════════════════════════════════════
    // ─── ЛУНА (новый объект, виден только ночью) ───────────────────────
    // ══════════════════════════════════════════════════════════════════
    const moonGroup = new THREE.Group();
    moonGroup.position.set(-40, 40, -120);
    moonGroup.visible = false; // скрыта днём

    // Основной диск луны
    const moonCore = new THREE.Mesh(
      new THREE.SphereGeometry(3, 32, 32),
      new THREE.MeshBasicMaterial({
        color: 0xFFFACD,
        fog: false,       // не скрывать туманом
        depthWrite: false,
        depthTest: false,
      })
    );
    moonCore.renderOrder = 999;
    moonGroup.add(moonCore);

    // Мягкий лунный ореол
    const moonGlow = new THREE.Mesh(
      new THREE.SphereGeometry(5.5, 32, 32),
      new THREE.MeshBasicMaterial({
        color: 0xD0E8FF,
        transparent: true,
        opacity: 0.18,
        fog: false,
        depthWrite: false,
        depthTest: false,
      })
    );
    moonGlow.renderOrder = 998;
    moonGroup.add(moonGlow);

    scene.add(moonGroup);

    // ── Лунный свет — мягкая точечная лампа ──────────────────────────
    const moonLight = new THREE.PointLight(0x8899CC, 0, 200);
    moonLight.position.set(-40, 0.5, -60); // отражение на воде
    scene.add(moonLight);
    // ══════════════════════════════════════════════════════════════════

    // ══════════════════════════════════════════════════════════════════
    // ─── ЗВЁЗДЫ (PointsMaterial, видны только ночью) ──────────────────
    // ══════════════════════════════════════════════════════════════════
    const STAR_COUNT = 300;
    const starPositions = new Float32Array(STAR_COUNT * 3);
    const starSizes     = new Float32Array(STAR_COUNT);

    for (let i = 0; i < STAR_COUNT; i++) {
      const angle  = Math.random() * Math.PI * 2;
      const radius = Math.random() * 200;
      starPositions[i * 3 + 0] = Math.cos(angle) * radius;          // X
      starPositions[i * 3 + 1] = 50 + Math.random() * 50;           // Y: 50–100
      starPositions[i * 3 + 2] = Math.sin(angle) * radius;          // Z
      starSizes[i] = 1 + Math.random() * 2;                          // 1–3 px
    }

    const starGeometry = new THREE.BufferGeometry();
    starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));

    const starMaterial = new THREE.PointsMaterial({
      color: 0xFFFFFF,
      size: 1.8,
      sizeAttenuation: false, // фиксированный размер в пикселях
      transparent: true,
      opacity: 0.9,
      fog: false,             // звёзды не скрываются туманом
    });

    const stars = new THREE.Points(starGeometry, starMaterial);
    stars.visible = false; // скрыты днём
    scene.add(stars);
    // ══════════════════════════════════════════════════════════════════

    // ─── МОРЕ ──────────────────────────────────────────────────────────
    const alphaCanvas = document.createElement('canvas');
    alphaCanvas.width  = 512;
    alphaCanvas.height = 512;
    const alphaCtx = alphaCanvas.getContext('2d');
    const gradient = alphaCtx.createRadialGradient(256, 256, 0, 256, 256, 256);
    gradient.addColorStop(0.0,  'rgba(255,255,255,1)');
    gradient.addColorStop(0.55, 'rgba(255,255,255,1)');
    gradient.addColorStop(0.80, 'rgba(255,255,255,0.6)');
    gradient.addColorStop(1.0,  'rgba(0,0,0,0)');
    alphaCtx.fillStyle = gradient;
    alphaCtx.fillRect(0, 0, 512, 512);

    const alphaTexture = new THREE.CanvasTexture(alphaCanvas);

    const planeGeometry = new THREE.PlaneGeometry(600, 600, 400, 400);
    const vertexCount = planeGeometry.attributes.position.count;
    const colorsArray = new Float32Array(vertexCount * 3);
    planeGeometry.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));

    const planeMaterial = new THREE.MeshStandardMaterial({
      vertexColors: true,
      transparent: true,
      opacity: 0.92,
      alphaMap: alphaTexture,
      alphaTest: 0.0,
      side: THREE.DoubleSide,
      roughness: 0.55,
      metalness: 0.05,
      flatShading: true,
      depthWrite: false,
    });

    const plane = new THREE.Mesh(planeGeometry, planeMaterial);
    plane.rotation.x = -Math.PI / 2;
    plane.position.y = 0;
    plane.receiveShadow = true;
    scene.add(plane);

    const planePositions = planeGeometry.attributes.position;
    const planeColors    = planeGeometry.attributes.color;

    // ── Дневные цвета воды ───────────────────────────────────────────
    const dayColors = {
      deep:  new THREE.Color(0x3A8A9A),
      mid:   new THREE.Color(0x7EC8E3),
      crest: new THREE.Color(0xFFFFFF),
      foam:  new THREE.Color(0xFFF8E7),
    };

    // ── Ночные цвета воды (новые) ─────────────────────────────────────
    const nightColors = {
      deep:  new THREE.Color(0x0F2A3A), // глубокий синий
      mid:   new THREE.Color(0x1A3A4A), // тёмно-синий
      crest: new THREE.Color(0xC0C8D4), // серебристые гребни
      foam:  new THREE.Color(0xD0D8E8), // чуть светлее серебра
    };

    const tmpColor = new THREE.Color();

    function waveHeight(wx, wz, t) {
      const p = 3.0;
      const w1 = Math.pow(1.0 - Math.abs(Math.sin((wx * 0.00875 + wz * 0.020) + t * 0.45)), p) * 2.2;
      const w2 = Math.pow(1.0 - Math.abs(Math.sin((wx * 0.01375 - wz * 0.045) + t * 0.65)), p) * 1.5;
      const w3 = Math.pow(1.0 - Math.abs(Math.sin((wx * 0.03333 + wz * 0.080) + t * 1.10)), p) * 0.7;
      const w4 = Math.pow(1.0 - Math.abs(Math.sin((-wx * 0.007 + wz * 0.042) + t * 0.30)), p) * 1.0;
      const raw = (w1 + w2 + w3 + w4) / (2.2 + 1.5 + 0.7 + 1.0);
      let amplitude = Math.pow(raw, 1.6) * 9.0;
      amplitude *= (1 + 0.1 * Math.sin(wx * 0.5));
      return amplitude;
    }

    // ─── ЧАЙКА ─────────────────────────────────────────────────────────
    function createWing(mirrorX = false) {
      const shape = new THREE.Shape();
      const sign  = mirrorX ? -1 : 1;
      shape.moveTo(0, 0);
      shape.bezierCurveTo(sign * 0.5, 0.3, sign * 2.5, 0.6, sign * 4.5, 0.1);
      shape.bezierCurveTo(sign * 3.5, -0.1, sign * 1.5, -0.3, 0, 0);
      const geometry = new THREE.ExtrudeGeometry(shape, {
        depth: 0.05, bevelEnabled: true, bevelSize: 0.05,
        bevelThickness: 0.02, bevelSegments: 2,
      });
      return new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({
        color: 0xF8F4F0, roughness: 0.7, metalness: 0.0, side: THREE.DoubleSide,
      }));
    }

    function createBody() {
      const mesh = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.2, 0.7, 8, 16),
        new THREE.MeshStandardMaterial({ color: 0xF5F1ED, roughness: 0.8 })
      );
      mesh.rotation.z = Math.PI / 2;
      return mesh;
    }

    function createTail() {
      const mesh = new THREE.Mesh(
        new THREE.ConeGeometry(0.15, 0.5, 6),
        new THREE.MeshStandardMaterial({ color: 0xEDE9E4, roughness: 0.8 })
      );
      mesh.rotation.z = Math.PI / 2;
      mesh.position.x = -0.6;
      return mesh;
    }

    function createHead() {
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 12, 12),
        new THREE.MeshStandardMaterial({ color: 0xF5F1ED, roughness: 0.8 })
      );
      mesh.position.set(0.55, 0.12, 0);
      return mesh;
    }

    function createBeak() {
      const mesh = new THREE.Mesh(
        new THREE.ConeGeometry(0.05, 0.3, 6),
        new THREE.MeshStandardMaterial({ color: 0xF5C842, roughness: 0.5 })
      );
      mesh.rotation.z = -Math.PI / 2;
      mesh.position.set(0.85, 0.1, 0);
      return mesh;
    }

    function createSeagull() {
      const group = new THREE.Group();
      const wingL = createWing(false);
      const wingR = createWing(true);
      wingL.position.set(-0.1, 0.08,  0.05);
      wingR.position.set(-0.1, 0.08, -0.10);
      group.add(createBody(), createTail(), createHead(), createBeak(), wingL, wingR);
      group.traverse(child => { if (child.isMesh) child.castShadow = true; });
      group.userData.wingL = wingL;
      group.userData.wingR = wingR;
      return group;
    }

    const seagulls = [];
    for (let i = 0; i < 7; i++) {
      const gull   = createSeagull();
      const angle  = (i / 7) * Math.PI * 2;
      const radius = 5 + Math.random() * 15;
      gull.position.set(Math.cos(angle) * radius, 4 + Math.random() * 8, Math.sin(angle) * radius);
      gull.scale.setScalar(0.6 + Math.random() * 0.6);
      gull.userData.speed         = 0.004 + Math.random() * 0.006;
      gull.userData.orbitRadius   = radius;
      gull.userData.orbitAngle    = angle;
      gull.userData.orbitY        = gull.position.y;
      gull.userData.wingPhase     = Math.random() * Math.PI * 2;
      gull.userData.wingSpeed     = 1.5 + Math.random() * 2;
      gull.userData.verticalPhase = Math.random() * Math.PI * 2;
      scene.add(gull);
      seagulls.push(gull);
    }

    // ─── ОБЛАКА ────────────────────────────────────────────────────────
    function createCloud() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, transparent: true, opacity: 0.85, roughness: 1.0 });
      [
        { r: 1.8, x:  0.0, y:  0.0, z: 0.0 },
        { r: 1.4, x:  1.8, y: -0.3, z: 0.3 },
        { r: 1.2, x: -1.6, y: -0.2, z: 0.1 },
        { r: 1.0, x:  0.6, y:  0.8, z: 0.0 },
        { r: 0.9, x: -0.5, y:  0.6, z: 0.2 },
      ].forEach(b => {
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(b.r, 10, 10), mat);
        mesh.position.set(b.x, b.y, b.z);
        group.add(mesh);
      });
      return group;
    }

    const clouds = [];
    for (let i = 0; i < 8; i++) {
      const cloud = createCloud();
      const angle = (i / 8) * Math.PI * 2 + Math.random() * 0.5;
      const dist  = 20 + Math.random() * 40;
      cloud.position.set(Math.cos(angle) * dist, 12 + Math.random() * 8, Math.sin(angle) * dist);
      cloud.scale.setScalar(0.8 + Math.random() * 1.2);
      cloud.userData.speed = 0.0008 + Math.random() * 0.0005;
      cloud.userData.angle = angle;
      cloud.userData.dist  = dist;
      scene.add(cloud);
      clouds.push(cloud);
    }

    // ─── УПРАВЛЕНИЕ ────────────────────────────────────────────────────
    const keys = {};
    window.addEventListener('keydown', e => {
      keys[e.code] = true;

      // ══════════════════════════════════════════════════════════════
      // ── Переключение дня/ночи по клавише N ───────────────────────
      // ══════════════════════════════════════════════════════════════
      if (e.code === 'KeyN') {
        toggleDayNight();
      }
    });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    // ══════════════════════════════════════════════════════════════════
    // ─── ПЕРЕМЕННАЯ РЕЖИМА и ФУНКЦИЯ ПЕРЕКЛЮЧЕНИЯ ─────────────────────
    // ══════════════════════════════════════════════════════════════════
    let isNight = false;
    const timeIndicator = document.getElementById('time-indicator');

    function toggleDayNight() {
      isNight = !isNight;

      if (isNight) {
        // ── Переключаем на ночь ────────────────────────────────────

        // Фон страницы
        document.body.classList.add('night');

        // Туман: тёмный, чуть плотнее
        scene.fog = new THREE.FogExp2(0x1A2A40, 0.004);

        // Освещение: холодный голубоватый ambient
        ambientLight.color.set(0x8899AA);
        ambientLight.intensity = 0.2;

        // Направленный свет: холодный синий, слабый
        dirLight.color.set(0x8899AA);
        dirLight.intensity = 0.3;

        // Солнце: скрыть
        sunGroup.visible      = false;
        sunReflection.visible = false;
        sunLight.visible      = false;

        // Луна и звёзды: показать
        moonGroup.visible = true;
        stars.visible     = true;
        moonLight.intensity = 1.5;

        // Индикатор
        timeIndicator.textContent = '☽ Ночь';

      } else {
        // ── Переключаем на день ────────────────────────────────────

        // Фон страницы
        document.body.classList.remove('night');

        // Туман: дневной
        scene.fog = new THREE.FogExp2(0xC8E8F5, 0.003);

        // Освещение: тёплый дневной ambient
        ambientLight.color.set(0xffffff);
        ambientLight.intensity = 0.6;

        // Направленный свет: солнечный тёплый
        dirLight.color.set(0xFFE4B5);
        dirLight.intensity = 1.2;

        // Солнце: показать
        sunGroup.visible      = true;
        sunReflection.visible = true;
        sunLight.visible      = true;

        // Луна и звёзды: скрыть
        moonGroup.visible   = false;
        stars.visible       = false;
        moonLight.intensity = 0;

        // Индикатор
        timeIndicator.textContent = '☀ День';
      }
    }
    // ══════════════════════════════════════════════════════════════════

    const playerGull = seagulls[0];
    playerGull.scale.setScalar(1.2);
    playerGull.position.set(0, 6, 10);
    playerGull.userData.isPlayer  = true;
    playerGull.userData.velocityY = 0;

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // ── Позиция солнца ────────────────────────────────────────────────
      sunGroup.position.set(SUN_WORLD_POS.x, SUN_WORLD_POS.y, SUN_WORLD_POS.z);

      sunReflection.position.x = sunGroup.position.x;
      sunReflection.position.z = sunGroup.position.z;
      sunReflection.position.y = 0.2;

      sunLight.position.x = sunGroup.position.x;
      sunLight.position.z = sunGroup.position.z;
      sunLight.position.y = 0.5;

      // ── Волны — цвет зависит от режима ────────────────────────────────
      // Выбираем нужный набор цветов в зависимости от isNight
      const wc = isNight ? nightColors : dayColors;

      const maxHeight  = 9.0;
      const midLevel   = maxHeight * 0.35;
      const crestLevel = maxHeight * 0.72;
      const foamLevel  = maxHeight * 0.88;

      for (let i = 0; i < planePositions.count; i++) {
        const wx = planePositions.getX(i);
        const wz = planePositions.getY(i);
        const h  = waveHeight(wx, wz, t);
        planePositions.setZ(i, h);

        if (h >= foamLevel) {
          const t2 = Math.min((h - foamLevel) / (maxHeight - foamLevel), 1.0);
          tmpColor.copy(wc.crest).lerp(wc.foam, t2);
        } else if (h >= crestLevel) {
          const t2 = (h - crestLevel) / (foamLevel - crestLevel);
          tmpColor.copy(wc.mid).lerp(wc.crest, Math.pow(t2, 0.5));
        } else if (h >= midLevel) {
          const t2 = (h - midLevel) / (crestLevel - midLevel);
          tmpColor.copy(wc.deep).lerp(wc.mid, t2);
        } else {
          tmpColor.copy(wc.deep);
        }
        planeColors.setXYZ(i, tmpColor.r, tmpColor.g, tmpColor.b);
      }
      planePositions.needsUpdate = true;
      planeColors.needsUpdate    = true;
      planeGeometry.computeVertexNormals();

      // ── Облака ─────────────────────────────────────────────────────────
      clouds.forEach(cloud => {
        cloud.userData.angle += cloud.userData.speed;
        cloud.position.x = Math.cos(cloud.userData.angle) * cloud.userData.dist;
        cloud.position.z = Math.sin(cloud.userData.angle) * cloud.userData.dist;
        cloud.position.y += Math.sin(t * 0.3 + cloud.userData.angle) * 0.002;
      });

      // ── NPC-чайки ──────────────────────────────────────────────────────
      seagulls.forEach(gull => {
        if (gull.userData.isPlayer) return;
        gull.userData.orbitAngle += gull.userData.speed;
        const a = gull.userData.orbitAngle;
        const r = gull.userData.orbitRadius;
        gull.position.x = Math.cos(a) * r;
        gull.position.z = Math.sin(a) * r;
        gull.position.y = gull.userData.orbitY + Math.sin(t * 0.5 + gull.userData.verticalPhase) * 1.2;
        gull.rotation.y = -a + Math.PI / 2;
        const wingAngle = Math.sin(t * gull.userData.wingSpeed + gull.userData.wingPhase) * 0.4;
        gull.userData.wingL.rotation.x =  wingAngle;
        gull.userData.wingR.rotation.x = -wingAngle;
      });

      // ── Игрок ──────────────────────────────────────────────────────────
      const moveSpeed = 0.08;
      const turnSpeed = 0.03;
      if (keys['ArrowLeft'])  playerGull.rotation.y += turnSpeed;
      if (keys['ArrowRight']) playerGull.rotation.y -= turnSpeed;
      const dir = new THREE.Vector3(-Math.sin(playerGull.rotation.y), 0, -Math.cos(playerGull.rotation.y));
      if (keys['ArrowUp'])   playerGull.position.addScaledVector(dir,  moveSpeed);
      if (keys['ArrowDown']) playerGull.position.addScaledVector(dir, -moveSpeed);
      if (keys['Space']) {
        playerGull.userData.velocityY = 0.08;
      } else {
        playerGull.userData.velocityY -= 0.003;
      }
      playerGull.userData.velocityY = Math.max(-0.1, Math.min(0.1, playerGull.userData.velocityY));
      playerGull.position.y = Math.max(1.5, Math.min(30, playerGull.position.y + playerGull.userData.velocityY));
      const pWingAngle = Math.sin(t * (keys['Space'] ? 4 : 2)) * 0.5;
      playerGull.userData.wingL.rotation.x =  pWingAngle;
      playerGull.userData.wingR.rotation.x = -pWingAngle;

      // ── Камера ─────────────────────────────────────────────────────────
      const offset = new THREE.Vector3(
        Math.sin(playerGull.rotation.y) * 20, 6,
        Math.cos(playerGull.rotation.y) * 20
      );
      const targetPos = playerGull.position.clone().add(offset);
      camera.position.lerp(targetPos, 0.05);

      const lookTarget = playerGull.position.clone().add(
        new THREE.Vector3(-Math.sin(playerGull.rotation.y) * 15, 1, -Math.cos(playerGull.rotation.y) * 15)
      );
      camera.lookAt(lookTarget);

      renderer.render(scene, camera);
    }

    animate();
  </script>
